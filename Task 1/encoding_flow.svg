<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380"
     font-family="Segoe UI, Arial, sans-serif" font-size="13">

  <!-- Background -->
  <rect width="900" height="380" fill="#f0f4f8" rx="14"/>

  <!-- ── Title ── -->
  <text x="450" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">
    Figure 5 — The Workflow of Encoding and Encryption in Email Transmission
  </text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#666">
    Section 1.8 · Data Systems and Security · ST4015CMD
  </text>

  <!-- ══════════════════════════════════════════════════════
       ARROW MARKER
  ══════════════════════════════════════════════════════ -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arr-down" markerWidth="7" markerHeight="10" refX="3.5" refY="9" orient="auto">
      <polygon points="0 0, 7 0, 3.5 10" fill="#475569"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════════════════════
       TOP ROW — STEPS 1–5  (left to right)
  ══════════════════════════════════════════════════════ -->

  <!-- Step 1: Sender -->
  <rect x="22"  y="75" width="120" height="72" rx="9" fill="#1d4ed8" stroke="#1e40af" stroke-width="1.8"/>
  <text x="82"  y="107" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">① Sender</text>
  <text x="82"  y="124" text-anchor="middle" font-size="10" fill="#bfdbfe">Composes email</text>
  <text x="82"  y="139" text-anchor="middle" font-size="10" fill="#bfdbfe">+ attachment</text>

  <!-- Arrow 1→2 -->
  <line x1="142" y1="111" x2="172" y2="111" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="157" y="106" text-anchor="middle" font-size="9" fill="#475569">plain text</text>

  <!-- Step 2: Base64 Encode -->
  <rect x="172" y="75" width="138" height="72" rx="9" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.8"/>
  <text x="241" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">② Base64</text>
  <text x="241" y="119" text-anchor="middle" font-size="10" fill="#e9d5ff">Encode body &amp;</text>
  <text x="241" y="134" text-anchor="middle" font-size="10" fill="#e9d5ff">attachments (MIME)</text>

  <!-- Arrow 2→3 -->
  <line x1="310" y1="111" x2="340" y2="111" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="325" y="106" text-anchor="middle" font-size="9" fill="#475569">ASCII text</text>

  <!-- Step 3: TLS Encrypt -->
  <rect x="340" y="75" width="138" height="72" rx="9" fill="#b91c1c" stroke="#991b1b" stroke-width="1.8"/>
  <text x="409" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">③ TLS Encrypt</text>
  <text x="409" y="119" text-anchor="middle" font-size="10" fill="#fecaca">Wraps Base64 data</text>
  <text x="409" y="134" text-anchor="middle" font-size="10" fill="#fecaca">in TLS ciphertext</text>

  <!-- Arrow 3→4 -->
  <line x1="478" y1="111" x2="508" y2="111" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="493" y="106" text-anchor="middle" font-size="9" fill="#475569">ciphertext</text>

  <!-- Step 4: SMTP Server -->
  <rect x="508" y="75" width="138" height="72" rx="9" fill="#0f766e" stroke="#0d6b63" stroke-width="1.8"/>
  <text x="577" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">④ SMTP Server</text>
  <text x="577" y="119" text-anchor="middle" font-size="10" fill="#99f6e4">Routes encrypted</text>
  <text x="577" y="134" text-anchor="middle" font-size="10" fill="#99f6e4">packet (no access)</text>

  <!-- Arrow 4→5 -->
  <line x1="646" y1="111" x2="676" y2="111" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="661" y="106" text-anchor="middle" font-size="9" fill="#475569">ciphertext</text>

  <!-- Step 5: TLS Decrypt -->
  <rect x="676" y="75" width="138" height="72" rx="9" fill="#c2410c" stroke="#9a3412" stroke-width="1.8"/>
  <text x="745" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">⑤ TLS Decrypt</text>
  <text x="745" y="119" text-anchor="middle" font-size="10" fill="#fed7aa">Decrypts at</text>
  <text x="745" y="134" text-anchor="middle" font-size="10" fill="#fed7aa">recipient MTA</text>

  <!-- ══════════════════════════════════════════════════════
       DOWN ARROW from Step 5 to Step 6
  ══════════════════════════════════════════════════════ -->
  <line x1="745" y1="147" x2="745" y2="220" stroke="#475569" stroke-width="2"/>
  <line x1="745" y1="220" x2="579" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="746" y="165" font-size="9" fill="#475569">Base64 text</text>

  <!-- ══════════════════════════════════════════════════════
       BOTTOM ROW — STEPS 6–7
  ══════════════════════════════════════════════════════ -->

  <!-- Step 6: Base64 Decode -->
  <rect x="437" y="190" width="140" height="72" rx="9" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.8"/>
  <text x="507" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">⑥ Base64</text>
  <text x="507" y="234" text-anchor="middle" font-size="10" fill="#e9d5ff">Decode → restores</text>
  <text x="507" y="249" text-anchor="middle" font-size="10" fill="#e9d5ff">original plain text</text>

  <!-- Arrow 6→7 -->
  <line x1="437" y1="226" x2="390" y2="226" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="414" y="221" text-anchor="middle" font-size="9" fill="#475569">plain text</text>

  <!-- Step 7: Recipient -->
  <rect x="248" y="190" width="140" height="72" rx="9" fill="#1d4ed8" stroke="#1e40af" stroke-width="1.8"/>
  <text x="318" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">⑦ Recipient</text>
  <text x="318" y="234" text-anchor="middle" font-size="10" fill="#bfdbfe">Reads original</text>
  <text x="318" y="249" text-anchor="middle" font-size="10" fill="#bfdbfe">email &amp; attachment ✓</text>

  <!-- ══════════════════════════════════════════════════════
       ROLE LABELS below boxes
  ══════════════════════════════════════════════════════ -->
  <text x="241" y="163" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="bold">ENCODING</text>
  <text x="409" y="163" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="bold">ENCRYPTION</text>
  <text x="577" y="163" text-anchor="middle" font-size="10" fill="#0f766e" font-weight="bold">ROUTING</text>
  <text x="745" y="163" text-anchor="middle" font-size="10" fill="#c2410c" font-weight="bold">DECRYPTION</text>
  <text x="507" y="278" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="bold">DECODING</text>

  <!-- ══════════════════════════════════════════════════════
       KEY INSIGHT BOX
  ══════════════════════════════════════════════════════ -->
  <rect x="22" y="300" width="558" height="62" rx="9" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.6"/>
  <text x="42" y="320" font-size="12" font-weight="bold" fill="#92400e">⚠  Key Insight (Section 1.3):</text>
  <text x="42" y="338" font-size="11" fill="#78350f">Base64 provides COMPATIBILITY — converts binary to ASCII for text-based SMTP.</text>
  <text x="42" y="354" font-size="11" fill="#78350f">TLS provides CONFIDENTIALITY — encrypts data so it cannot be intercepted.</text>

  <!-- ══════════════════════════════════════════════════════
       FLOW SUMMARY (right)
  ══════════════════════════════════════════════════════ -->
  <rect x="598" y="300" width="280" height="62" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/>
  <text x="618" y="320" font-size="12" font-weight="bold" fill="#166534">Flow Summary:</text>
  <text x="618" y="336" font-size="11" fill="#14532d">Sender → Base64 → TLS Encrypt →</text>
  <text x="618" y="352" font-size="11" fill="#14532d">SMTP → TLS Decrypt → Base64 → Recipient</text>
</svg>
